name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  PAGES_BASE_PATH: ${{ vars.PAGES_BASE_PATH }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Resolve base path
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER_NAME="${GITHUB_REPOSITORY_OWNER}"

          if [[ -n "${PAGES_BASE_PATH}" ]]; then
            BASE_PATH="${PAGES_BASE_PATH}"
          elif [[ "${REPO_NAME}" == "${OWNER_NAME}.github.io" ]]; then
            BASE_PATH="/"
          else
            BASE_PATH="/${REPO_NAME}/"
          fi

          if [[ "${BASE_PATH}" != /* ]]; then
            BASE_PATH="/${BASE_PATH}"
          fi

          if [[ "${BASE_PATH}" != */ ]]; then
            BASE_PATH="${BASE_PATH}/"
          fi

          echo "BASE_PATH=${BASE_PATH}" >> "${GITHUB_ENV}"
          echo "Using BASE_PATH=${BASE_PATH}"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
